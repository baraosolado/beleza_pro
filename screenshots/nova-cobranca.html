<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c3bed",
                        "background-light": "#f7f6f8",
                        "background-dark": "#171121",
                        "sidebar-dark": "#1e1b4b", // indigo-950 equivalent
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "12px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-nav { background-color: rgba(124, 58, 237, 0.2); border-left: 4px solid #7c3bed; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex">
<!-- Sidebar -->
<aside class="w-64 bg-sidebar-dark text-white flex flex-col hidden md:flex shrink-0">
<div class="p-6 flex flex-col gap-1">
<h1 class="text-xl font-bold tracking-tight text-white">Beleza Pro</h1>
<p class="text-indigo-300 text-xs font-medium uppercase tracking-wider">SaaS de Gestão</p>
</div>
<nav class="flex-1 px-3 mt-4 flex flex-col gap-1">
<a class="flex items-center gap-3 px-4 py-3 text-indigo-100 hover:bg-white/10 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-sm font-medium">Início</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-indigo-100 hover:bg-white/10 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-sm font-medium">Clientes</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-indigo-100 hover:bg-white/10 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-sm font-medium">Agenda</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-indigo-100 hover:bg-white/10 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">content_cut</span>
<span class="text-sm font-medium">Serviços</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 bg-primary/20 text-white rounded-lg border-l-4 border-primary transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">receipt_long</span>
<span class="text-sm font-medium">Cobranças</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-indigo-100 hover:bg-white/10 rounded-lg transition-colors mt-auto mb-6" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-sm font-medium">Configurações</span>
</a>
</nav>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
<!-- Header / Breadcrumb -->
<header class="px-8 py-6">
<nav class="flex items-center gap-2 text-sm text-slate-500 mb-2">
<a class="hover:text-primary transition-colors" href="#">Cobranças</a>
<span class="material-symbols-outlined text-xs">chevron_right</span>
<span class="text-slate-900 font-medium">Nova Cobrança</span>
</nav>
<h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Nova Cobrança</h2>
</header>
<!-- Form Container -->
<section class="px-8 pb-12">
<div class="max-w-[640px] bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
<div class="p-8 space-y-8">
<!-- 1. Seleção de Cliente -->
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-700">Cliente</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">search</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Buscar cliente (ex: Ana Silva)" type="text" value="Ana Silva"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 bg-slate-100 rounded px-1.5 py-0.5 text-[10px] font-bold text-slate-500 uppercase">ESC para limpar</div>
</div>
</div>
<!-- 2. Detalhes da Cobrança -->
<div class="space-y-5">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2">Detalhes da Cobrança</h3>
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-700">Serviço Prestado</label>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer">
<input checked="" class="peer hidden" name="service" type="radio"/>
<div class="px-4 py-2 rounded-full border border-slate-200 peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary text-sm font-medium hover:bg-slate-50 transition-all">Corte Feminino</div>
</label>
<label class="cursor-pointer">
<input class="peer hidden" name="service" type="radio"/>
<div class="px-4 py-2 rounded-full border border-slate-200 peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary text-sm font-medium hover:bg-slate-50 transition-all">Coloração</div>
</label>
<label class="cursor-pointer">
<input class="peer hidden" name="service" type="radio"/>
<div class="px-4 py-2 rounded-full border border-slate-200 peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary text-sm font-medium hover:bg-slate-50 transition-all">Manicure</div>
</label>
<label class="cursor-pointer">
<input class="peer hidden" name="service" type="radio"/>
<div class="px-4 py-2 rounded-full border border-slate-200 peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary text-sm font-medium hover:bg-slate-50 transition-all">Valor Manual</div>
</label>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700">Valor</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-medium">R$</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-semibold" type="text" value="120,00"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700">Data de Vencimento</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">calendar_month</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="date" value="2023-11-20"/>
</div>
</div>
</div>
</div>
<!-- 3. Forma de Recebimento -->
<div class="space-y-5">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2">Pagamento e Notificações</h3>
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-700">Meio de Recebimento</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-primary bg-primary/5 text-primary">
<span class="material-symbols-outlined text-3xl">qr_code_2</span>
<span class="text-xs font-bold">Pix</span>
</button>
<button class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-slate-600">
<span class="material-symbols-outlined text-3xl">credit_card</span>
<span class="text-xs font-bold">Cartão</span>
</button>
<button class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-slate-600">
<span class="material-symbols-outlined text-3xl">payments</span>
<span class="text-xs font-bold">Dinheiro</span>
</button>
</div>
</div>
<div class="space-y-4 pt-2">
<label class="flex items-center justify-between cursor-pointer group">
<div class="flex flex-col">
<span class="text-sm font-semibold text-slate-700">Gerar QR Code Pix agora</span>
<span class="text-xs text-slate-500">O código será exibido após a criação</span>
</div>
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
<label class="flex items-center justify-between cursor-pointer group">
<div class="flex flex-col">
<span class="text-sm font-semibold text-slate-700">Enviar lembrete via WhatsApp</span>
<span class="text-xs text-slate-500">Notifica o cliente automaticamente</span>
</div>
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
</div>
</div>
<!-- 4. Observações -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700">Observações (Interno)</label>
<textarea class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 resize-none" placeholder="Ex: Cliente solicitou parcelamento em 2x..." rows="3"></textarea>
</div>
</div>
<!-- Ações -->
<div class="bg-slate-50 border-t border-slate-100 p-6 flex items-center justify-end gap-3">
<button class="px-6 py-2.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-200 transition-colors">
                        Cancelar
                    </button>
<button class="px-8 py-2.5 rounded-lg text-sm font-semibold bg-primary text-white hover:bg-primary/90 shadow-lg shadow-primary/25 transition-all flex items-center gap-2">
<span>Criar Cobrança</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</section>
</main>
</body></html>
